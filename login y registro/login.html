<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VacationFlow - Iniciar Sesión</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="contenedor-login">
        <div class="tarjeta-login">
            <div class="linea-superior"></div>

            <div class="logo-seccion">
                <div class="icono-paraguas">⛱️</div>
                <div class="marca">vacationflow</div>
                <p class="lema">The Digital Sanctuary</p>
            </div>

            <div class="cuerpo-login">
                <h2>Iniciar sesión</h2>
                <p class="instruccion">Ingresa tus credenciales para continuar.</p>

                <form>
                    <div class="campo">
                        <label>CORREO CORPORATIVO</label>
                        <div class="input-con-icono">
                            <span class="icono-input">✉️</span>
                            <input type="email" placeholder="j.perez@empresa.com">
                        </div>
                    </div>

                    <div class="campo">
                        <div class="fila-label">
                            <label>CONTRASEÑA</label>
                            <a href="#" class="olvido">¿Olvidaste tu contraseña?</a>
                        </div>
                        <div class="input-con-icono">
                            <span class="icono-input">🔒</span>
                            <input type="password" placeholder="••••••••">
                        </div>
                    </div>

                    <div class="recordar">
                        <input type="checkbox" id="check">
                        <label for="check">Recordar mi sesión</label>
                    </div>

                    <button type="submit" class="boton-acceder">
                        Acceder al panel &nbsp; →
                    </button>
                </form>
                <p class="pie-login">
                    ¿No tienes una cuenta? <a href="index.html">Solicitar acceso</a>
                </p>
    
                <script src="login.js"></script>
                <p class="pie-login">
                    ¿No tienes una cuenta? <a href="index.html">Solicitar acceso</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
