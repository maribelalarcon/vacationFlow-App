<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VacationFlow - Iniciar Sesión</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="contenedor-login">
        <div class="tarjeta-login">
            <div class="linea-superior"></div>

            <div class="logo-seccion">
                <div class="icono-paraguas">⛱️</div>
                <div class="marca">vacationflow</div>
                <p class="lema">The Digital Sanctuary</p>
            </div>

            <div class="cuerpo-login">
                <h2>Iniciar sesión</h2>
                <p class="instruccion">Ingresa tus credenciales para continuar.</p>

                <form id="loginForm">
                    <div class="campo">
                        <label for="email">CORREO CORPORATIVO</label>
                        <div class="input-con-icono">
                            <span class="icono-input">✉️</span>
                            <input type="email" id="email" placeholder="j.perez@empresa.com" required>
                        </div>
                    </div>

                    <div class="campo">
                        <div class="fila-label">
                            <label for="password">CONTRASEÑA</label>
                            <a href="#" class="olvido">¿Olvidaste tu contraseña?</a>
                        </div>
                        <div class="input-con-icono">
                            <span class="icono-input">🔒</span>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="recordar">
                        <input type="checkbox" id="check">
                        <label for="check">Recordar mi sesión</label>
                    </div>

                    <button type="submit" class="boton-acceder" id="submitBtn">
                       Acceder &nbsp; →
                    </button>

                    <!-- Mensaje de estado (error/éxito) -->
                    <p id="loginMessage" class="mensaje-estado"></p>
                </form>

                <p class="pie-login">
                    ¿No tienes una cuenta? <a href="crear_cuenta.html">Crear cuenta</a>
                </p>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
